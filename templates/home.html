<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Prediction</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="main-container">

    <div class="prediction-card">

        <div class="text-center mb-4">

            <h1 class="title">
                🎓 Student Exam Performance Predictor
            </h1>

            <p class="subtitle">
                Fill in the student details below to predict the Maths Score.
            </p>

        </div>

        <form action="{{ url_for('predict_datapoint') }}" method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">Gender</label>

                    <select class="form-select" name="gender" required>

                        <option selected disabled>Select Gender</option>

                        <option value="male">Male</option>

                        <option value="female">Female</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">Race / Ethnicity</label>

                    <select class="form-select" name="ethnicity" required>

                        <option selected disabled>Select Group</option>

                        <option value="group A">Group A</option>

                        <option value="group B">Group B</option>

                        <option value="group C">Group C</option>

                        <option value="group D">Group D</option>

                        <option value="group E">Group E</option>

                    </select>

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Parental Level of Education
                </label>

                <select class="form-select"
                        name="parental_level_of_education"
                        required>

                    <option selected disabled>Select Education</option>

                    <option value="associate's degree">Associate's Degree</option>

                    <option value="bachelor's degree">Bachelor's Degree</option>

                    <option value="high school">High School</option>

                    <option value="master's degree">Master's Degree</option>

                    <option value="some college">Some College</option>

                    <option value="some high school">Some High School</option>

                </select>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Lunch Type
                    </label>

                    <select class="form-select" name="lunch" required>

                        <option selected disabled>Select Lunch</option>

                        <option value="standard">Standard</option>

                        <option value="free/reduced">
                            Free / Reduced
                        </option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Test Preparation Course
                    </label>

                    <select class="form-select"
                            name="test_preparation_course"
                            required>

                        <option selected disabled>Select Option</option>

                        <option value="completed">Completed</option>

                        <option value="none">None</option>

                    </select>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">
                        Reading Score
                    </label>

                    <input
                        type="number"
                        class="form-control"
                        name="reading_score"
                        placeholder="0 - 100"
                        min="0"
                        max="100"
                        required>

                </div>

                <div class="col-md-6 mb-4">

                    <label class="form-label">
                        Writing Score
                    </label>

                    <input
                        type="number"
                        class="form-control"
                        name="writing_score"
                        placeholder="0 - 100"
                        min="0"
                        max="100"
                        required>

                </div>

            </div>

            <div class="d-grid">

                <button type="submit" class="btn predict-btn">

                    🚀 Predict Maths Score

                </button>

            </div>

        </form>

        {% if results %}

        <div class="result-card">

            <h4>
                Predicted Maths Score
            </h4>

            <div class="score">

                {{ results }}

            </div>

        </div>

        {% endif %}

        <div class="text-center mt-4">

            <a href="{{ url_for('index') }}" class="back-link">

                ← Back to Home

            </a>

        </div>

    </div>

</div>

</body>

</html>
